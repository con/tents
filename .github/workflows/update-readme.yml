name: Update README table

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-table:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python code/update_readme.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            BRANCH="automated/update-readme-table"
            git checkout -b "$BRANCH"
            git commit -m "chore: update repo table [skip ci]"
            git push --force origin "$BRANCH"
            if gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number' | grep -q .; then
              echo "PR already exists."
            else
              gh pr create \
                --title "chore: update repo table" \
                --body "Automated update of the repository table in README.md." \
                --base main \
                --head "$BRANCH"
            fi
          fi
